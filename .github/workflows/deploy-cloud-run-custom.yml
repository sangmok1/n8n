name: Deploy Custom n8n to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_ID: api-creator-461905
  REGION: asia-northeast3
  SERVICE_NAME: n8n
  GAR_REPO: n8n-custom-repo
  INSTANCE_CONNECTION_NAME: api-creator-461905:asia-northeast3:n8n-db

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.15.0
          cache: pnpm

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth for GAR
        run: gcloud auth configure-docker "${{ env.REGION }}-docker.pkg.dev" --quiet

      - name: Ensure Artifact Registry repo exists
        run: |
          gcloud artifacts repositories create "${{ env.GAR_REPO }}" \
            --repository-format=docker \
            --location="${{ env.REGION }}" \
            --description="n8n custom images" || true

      - name: Build and push image
        run: |
          pnpm install --frozen-lockfile
          node scripts/build-n8n.mjs
          IMAGE_TAG="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          docker build -f docker/images/n8n/Dockerfile -t "${IMAGE_TAG}" .
          docker push "${IMAGE_TAG}"
          echo "IMAGE_TAG=${IMAGE_TAG}" >> "$GITHUB_ENV"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "${{ env.SERVICE_NAME }}" \
            --image "${{ env.IMAGE_TAG }}" \
            --region "${{ env.REGION }}" \
            --port 5678 \
            --add-cloudsql-instances "${{ env.INSTANCE_CONNECTION_NAME }}" \
            --update-env-vars "DB_TYPE=postgresdb,DB_POSTGRESDB_HOST=/cloudsql/${{ env.INSTANCE_CONNECTION_NAME }},DB_POSTGRESDB_PORT=5432,DB_POSTGRESDB_DATABASE=n8n,DB_POSTGRESDB_USER=n8n_user,N8N_PORT=5678,N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=false,N8N_BLOCK_ENV_ACCESS_IN_NODE=false,WEBHOOK_URL=${{ secrets.WEBHOOK_URL }}" \
            --set-secrets "DB_POSTGRESDB_PASSWORD=db-postgres-password:latest,N8N_ENCRYPTION_KEY=n8n-encryption-key:latest"

      - name: Confirm deployed image
        run: |
          gcloud run services describe "${{ env.SERVICE_NAME }}" \
            --region "${{ env.REGION }}" \
            --format='value(spec.template.spec.containers[0].image)'

